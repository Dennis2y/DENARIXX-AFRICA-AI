kind = "web"
previewPath = "/"
title = "DENARIXX AFRICA AI"
version = "1.0.0"
id = "artifacts/denarixx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22275

[services.development]
run = "pnpm --filter @workspace/denarixx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/denarixx", "run", "build" ]
publicDir = "artifacts/denarixx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22275"
BASE_PATH = "/"
