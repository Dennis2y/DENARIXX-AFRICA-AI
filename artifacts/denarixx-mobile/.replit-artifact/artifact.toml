kind = "mobile"
previewPath = "/mobile/"
title = "DENARIXX Mobile"
version = "1.0.0"
id = "artifacts/denarixx-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 24951

[services.development]
run = "pnpm --filter @workspace/denarixx-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/denarixx-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/denarixx-mobile", "run", "serve" ]

[services.env]
PORT = "24951"
BASE_PATH = "/mobile/"
