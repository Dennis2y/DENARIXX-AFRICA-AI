openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
  - name: skillswap
    description: SkillSwap AI — peer-to-peer skill exchange
  - name: dena
    description: DENA AI — conversational assistant
  - name: users
    description: User profile management
  - name: cvbuilder
    description: AI CV & cover letter generator
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist/count:
    get:
      operationId: getWaitlistCount
      tags: [waitlist]
      summary: Get waitlist count
      description: Returns the total number of people on the waitlist (public)
      responses:
        "200":
          description: Waitlist count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistCount"
  /waitlist/referrals/{code}:
    get:
      operationId: getWaitlistReferrals
      tags: [waitlist]
      summary: Get referral stats for a code
      description: Returns how many people signed up using a referral code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistReferralStats"
        "404":
          description: Code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Register email for early access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinWaitlistRequest"
      responses:
        "201":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinWaitlistResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listWaitlist
      tags: [waitlist]
      summary: List waitlist signups
      description: Retrieve all waitlist entries for admin view
      responses:
        "200":
          description: List of waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistList"
  /waitlist/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [waitlist]
      summary: Public referral leaderboard
      description: Returns top referrers with anonymized display info
      responses:
        "200":
          description: Leaderboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
  /skillswap/listings:
    get:
      operationId: getSkillListings
      tags: [skillswap]
      summary: Browse skill listings
      description: Returns all active skill listings (public)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [offering, seeking]
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of skill listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillListingsResponse"
    post:
      operationId: createSkillListing
      tags: [skillswap]
      summary: Create a skill listing
      description: Post a skill you are offering or seeking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillListingResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /skillswap/my-listings:
    get:
      operationId: getMySkillListings
      tags: [skillswap]
      summary: My skill listings
      description: Returns the authenticated user's own listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySkillListingsResponse"
  /skillswap/listings/{id}:
    delete:
      operationId: deleteSkillListing
      tags: [skillswap]
      summary: Delete a skill listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /skillswap/matches:
    get:
      operationId: getSkillMatches
      tags: [skillswap]
      summary: AI-powered match suggestions
      description: Returns skill listings most relevant to the authenticated user, ranked by AI
      responses:
        "200":
          description: AI match results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillMatchesResponse"
  /skillswap/connections:
    get:
      operationId: getSkillConnections
      tags: [skillswap]
      summary: My connections
      description: Returns all connection requests sent or received by the authenticated user
      responses:
        "200":
          description: Connections list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillConnectionsResponse"
    post:
      operationId: createSkillConnection
      tags: [skillswap]
      summary: Send a connection request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillConnectionRequest"
      responses:
        "201":
          description: Connection request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillConnectionResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /skillswap/connections/{id}:
    patch:
      operationId: updateSkillConnection
      tags: [skillswap]
      summary: Accept or decline a connection request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConnectionStatusRequest"
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillConnectionResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dena/chat:
    post:
      operationId: denaChatStream
      tags: [dena]
      summary: Stream a DENA AI response
      description: Sends a message and streams the reply via SSE. Persists conversation when authenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DenaChatRequest"
      responses:
        "200":
          description: SSE stream of content chunks
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dena/conversations:
    get:
      operationId: getDenaConversations
      tags: [dena]
      summary: List user's saved conversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DenaConversationsResponse"
  /dena/conversations/{id}/messages:
    get:
      operationId: getDenaConversationMessages
      tags: [dena]
      summary: Load all messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DenaMessagesResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dena/conversations/{id}:
    delete:
      operationId: deleteDenaConversation
      tags: [dena]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile with skills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /users/me/skills:
    put:
      operationId: updateMySkills
      tags: [users]
      summary: Replace user skill list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSkillsRequest"
      responses:
        "200":
          description: Updated skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSkill"
  /cv-builder/generate:
    post:
      operationId: generateCv
      tags: [cvbuilder]
      summary: Generate AI resume and cover letter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvGenerateRequest"
      responses:
        "200":
          description: Generated resume and cover letter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CvGenerateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    JoinWaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        userType:
          type: string
        country:
          type: string
        referredBy:
          type: string
      required:
        - email
    JoinWaitlistResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        message:
          type: string
        referralCode:
          type: string
      required:
        - id
        - email
        - message
        - referralCode
    WaitlistEntry:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        userType:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        referralCode:
          type: string
          nullable: true
        referredBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt
    WaitlistList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WaitlistEntry"
        total:
          type: integer
      required:
        - entries
        - total
    WaitlistCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    WaitlistReferralStats:
      type: object
      properties:
        code:
          type: string
        referralCount:
          type: integer
      required:
        - code
        - referralCount
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        displayName:
          type: string
        maskedEmail:
          type: string
        referralCount:
          type: integer
        referralCode:
          type: string
      required:
        - rank
        - displayName
        - maskedEmail
        - referralCount
        - referralCode
    LeaderboardResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        total:
          type: integer
      required:
        - entries
        - total
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SkillListing:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        skillName:
          type: string
        category:
          type: string
        listingType:
          type: string
          enum: [offering, seeking]
        description:
          type: string
          nullable: true
        level:
          type: string
        availability:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        userName:
          type: string
          nullable: true
        userAvatar:
          type: string
          nullable: true
        userLocation:
          type: string
          nullable: true
        userRole:
          type: string
          nullable: true
      required:
        - id
        - userId
        - skillName
        - category
        - listingType
        - level
        - createdAt
    SkillListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/SkillListing"
        total:
          type: integer
      required:
        - listings
        - total
    MySkillListing:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        skillName:
          type: string
        category:
          type: string
        listingType:
          type: string
          enum: [offering, seeking]
        description:
          type: string
          nullable: true
        level:
          type: string
        availability:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - skillName
        - category
        - listingType
        - level
        - isActive
        - createdAt
    MySkillListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/MySkillListing"
      required:
        - listings
    CreateSkillListingRequest:
      type: object
      properties:
        skillName:
          type: string
        category:
          type: string
        listingType:
          type: string
          enum: [offering, seeking]
        description:
          type: string
        level:
          type: string
        availability:
          type: string
      required:
        - skillName
        - listingType
    SkillListingResult:
      type: object
      properties:
        listing:
          $ref: "#/components/schemas/MySkillListing"
      required:
        - listing
    SkillMatchesResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/SkillListing"
        reason:
          type: string
      required:
        - matches
    SkillConnection:
      type: object
      properties:
        id:
          type: integer
        requesterId:
          type: integer
        targetId:
          type: integer
        listingId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, accepted, declined]
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - requesterId
        - targetId
        - status
        - createdAt
    SkillConnectionsResponse:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/SkillConnection"
      required:
        - connections
    CreateSkillConnectionRequest:
      type: object
      properties:
        targetUserId:
          type: integer
        listingId:
          type: integer
        message:
          type: string
      required:
        - targetUserId
    SkillConnectionResult:
      type: object
      properties:
        connection:
          $ref: "#/components/schemas/SkillConnection"
      required:
        - connection
    UpdateConnectionStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, declined]
      required:
        - status
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    DenaChatRequest:
      type: object
      properties:
        message:
          type: string
        conversationId:
          type: integer
      required:
        - message
    DenaConversation:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - title
        - createdAt
        - updatedAt
    DenaConversationsResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/DenaConversation"
      required:
        - conversations
    DenaMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    DenaMessagesResponse:
      type: object
      properties:
        conversationId:
          type: integer
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DenaMessage"
      required:
        - conversationId
        - title
        - messages
    UserSkill:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        skill:
          type: string
        level:
          type: string
      required:
        - id
        - userId
        - skill
        - level
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        twitterHandle:
          type: string
          nullable: true
        linkedinUrl:
          type: string
          nullable: true
        githubHandle:
          type: string
          nullable: true
        reputationScore:
          type: integer
        skills:
          type: array
          items:
            $ref: "#/components/schemas/UserSkill"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - email
        - reputationScore
        - skills
        - createdAt
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        role:
          type: string
        location:
          type: string
        country:
          type: string
        website:
          type: string
        twitterHandle:
          type: string
        linkedinUrl:
          type: string
        githubHandle:
          type: string
    UpdateSkillsRequest:
      type: object
      properties:
        skills:
          type: array
          items:
            type: object
            properties:
              skill:
                type: string
              level:
                type: string
            required:
              - skill
      required:
        - skills
    CvGenerateRequest:
      type: object
      properties:
        name:
          type: string
        targetRole:
          type: string
        currentRole:
          type: string
        experience:
          type: string
        skills:
          type: array
          items:
            type: string
        education:
          type: string
        achievements:
          type: string
        tone:
          type: string
          enum: [professional, creative, executive]
      required:
        - name
        - targetRole
        - experience
    CvGenerateResponse:
      type: object
      properties:
        resume:
          type: string
        coverLetter:
          type: string
      required:
        - resume
        - coverLetter
