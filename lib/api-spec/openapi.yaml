openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Register email for early access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinWaitlistRequest"
      responses:
        "201":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinWaitlistResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    JoinWaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        userType:
          type: string
      required:
        - email
    JoinWaitlistResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        message:
          type: string
      required:
        - id
        - email
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
